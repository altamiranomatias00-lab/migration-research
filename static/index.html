<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Pathway Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root,body[data-theme="dark"]{
  --bg:#000;--fg:#FAFAFA;--fg2:#ccc;--g1:#888;--g2:#444;--g3:#222;--g4:#111;
  --glass:rgba(17,17,17,.85);--glass2:rgba(0,0,0,.88);--glass3:rgba(0,0,0,.94);
  --border:#222;--border2:#1a1a1a;--card:#111;--hover:rgba(255,255,255,.03);
  --active:rgba(255,255,255,.05);--chip-on:rgba(255,255,255,.06);
  --badge-v:#FAFAFA;--badge-g:#888;
  --tl-s:rgba(255,255,255,.08);--tl-e:rgba(255,255,255,.04);--tl-g:rgba(255,255,255,.02);
}
body[data-theme="light"]{
  --bg:#F5F5F5;--fg:#0A0A0A;--fg2:#333;--g1:#777;--g2:#aaa;--g3:#ddd;--g4:#eee;
  --glass:rgba(255,255,255,.88);--glass2:rgba(245,245,245,.92);--glass3:rgba(245,245,245,.96);
  --border:#ddd;--border2:#e5e5e5;--card:#fff;--hover:rgba(0,0,0,.02);
  --active:rgba(0,0,0,.04);--chip-on:rgba(0,0,0,.06);
  --badge-v:#0A0A0A;--badge-g:#888;
  --tl-s:rgba(0,0,0,.06);--tl-e:rgba(0,0,0,.04);--tl-g:rgba(0,0,0,.02);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;width:100vw;transition:background .4s,color .4s}
canvas#globe{position:fixed;inset:0;z-index:0}

/* LOGO */
#logo{position:fixed;top:24px;left:28px;z-index:150;display:flex;align-items:center;gap:10px;
user-select:none;pointer-events:none}
#logo svg{width:32px;height:32px}
#logo .logo-text{font-size:11px;font-weight:900;letter-spacing:5px;text-transform:uppercase;
color:var(--fg);opacity:.7;transition:color .3s,opacity .3s}

/* TOP-RIGHT CONTROLS */
.top-controls{position:fixed;top:24px;right:24px;z-index:150;display:flex;gap:10px;align-items:center}
.ctrl-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
background:var(--glass);backdrop-filter:blur(12px);cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:all .3s}
.ctrl-btn:hover{border-color:var(--g1)}
.ctrl-btn svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:1.5;transition:stroke .3s}
#langToggle{font-family:'Inter',sans-serif;font-size:11px;font-weight:900;letter-spacing:1px;
color:var(--fg);width:auto;padding:0 14px;border-radius:22px}

/* SEARCH BUBBLE */
#searchBubble{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:100;
display:flex;align-items:center;gap:12px;background:var(--glass);
backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:60px;padding:8px 8px 8px 24px;
transition:all .5s cubic-bezier(.25,.8,.25,1),opacity .3s,width .5s,max-width .5s,padding .5s,border-radius .5s;max-width:600px;width:90%}
#searchBubble.expanded{border-radius:24px;max-width:700px;flex-wrap:wrap;padding:16px 20px;
align-items:flex-start;bottom:24px}
/* Collapsed: tiny floating lupa */
#searchBubble.collapsed{max-width:52px;width:52px;padding:0;border-radius:50%;height:52px;
justify-content:center;gap:0;bottom:32px;left:32px;transform:none;cursor:pointer}
#searchBubble.collapsed #searchQ,
#searchBubble.collapsed #searchBtn,
#searchBubble.collapsed .filters-row{display:none!important}
#searchBubble.collapsed .lupa{opacity:.7;width:22px;height:22px}
#searchBubble.collapsed .lupa svg{width:22px;height:22px}
#searchBubble.collapsed:hover{border-color:var(--g1);box-shadow:0 0 20px rgba(255,255,255,.08)}
#searchBubble .lupa{width:20px;height:20px;opacity:.5;flex-shrink:0;cursor:pointer}
#searchBubble .lupa svg{width:20px;height:20px}
#searchQ{flex:1;min-width:180px;background:none;border:none;color:var(--fg);font-family:inherit;
font-size:15px;font-weight:300;letter-spacing:.5px;outline:none}
#searchQ::placeholder{color:var(--g2);letter-spacing:2px;font-weight:300}
#searchBtn{background:var(--fg);color:var(--bg);border:none;border-radius:40px;padding:10px 28px;
font-family:inherit;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
cursor:pointer;transition:opacity .15s;flex-shrink:0}
#searchBtn:hover{opacity:.85}
#searchBtn:disabled{opacity:.4;cursor:not-allowed}

/* FILTERS ROW */
.filters-row{display:none;width:100%;padding-top:12px;gap:20px;flex-wrap:wrap;align-items:center}
#searchBubble.expanded .filters-row{display:flex}
.filter-grp{display:flex;align-items:center;gap:8px}
.f-label{font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--g1);white-space:nowrap}
.chip{padding:5px 12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
border:1px solid var(--border);background:transparent;color:var(--g1);cursor:pointer;border-radius:20px;
transition:all .15s;user-select:none}
.chip:hover{border-color:var(--g1)}
.chip.on{border-color:var(--fg);color:var(--fg);background:var(--chip-on)}
.region-chips{display:flex;gap:4px;flex-wrap:wrap}
.country-tags{display:flex;gap:4px;flex-wrap:wrap;max-width:400px}
.ctag{padding:3px 8px;font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
border:1px solid var(--border);background:transparent;color:var(--g1);cursor:pointer;border-radius:12px;
transition:all .15s;user-select:none}
.ctag:hover{border-color:var(--g1)}
.ctag.on{border-color:var(--fg);color:var(--fg);background:var(--chip-on)}

/* RESULTS PANEL */
#resultsPanel{position:fixed;right:0;top:0;bottom:0;width:420px;z-index:90;
background:var(--glass2);backdrop-filter:blur(16px);border-left:1px solid var(--border2);
transform:translateX(100%);transition:transform .5s cubic-bezier(.25,.8,.25,1);
overflow-y:auto;-webkit-overflow-scrolling:touch}
#resultsPanel.open{transform:translateX(0)}
.r-head{padding:32px 28px 16px;border-bottom:1px solid var(--border2);display:flex;
justify-content:space-between;align-items:center}
.r-count{font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--g1)}
.r-count span{color:var(--fg);font-weight:700}
.r-close{background:none;border:none;color:var(--g2);font-size:24px;cursor:pointer;
font-family:inherit;transition:color .15s}
.r-close:hover{color:var(--fg)}
.r-list{padding:8px 0}

/* RESULT CARD */
.rcard{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:16px;
padding:20px 28px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.rcard:hover{background:var(--hover)}
.rcard.active{background:var(--active);border-left-color:var(--fg)}
.rcard .rk{font-size:24px;font-weight:900;color:var(--border);letter-spacing:-1px}
.rcard.active .rk,.rcard:nth-child(-n+3) .rk{color:var(--fg)}
.rcard .rinfo h4{font-size:13px;font-weight:700;letter-spacing:-.1px;margin-bottom:2px}
.rcard .rinfo .runi{font-size:11px;font-weight:300;color:var(--g1)}
.rcard .rinfo .rtags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.rtag{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
padding:2px 6px;border:1px solid}
.rtag.v{color:var(--badge-v);border-color:var(--badge-v)}
.rtag.g{color:var(--badge-g);border-color:var(--badge-g)}
.rtag.w{color:var(--g1);border-color:var(--g1)}
.rtag.i{color:var(--g1);border-color:var(--g1)}
.rcard .rvci{text-align:right}
.rcard .rvci .rv{font-size:16px;font-weight:900;letter-spacing:-.5px}
.rcard .rvci .rl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--g2)}

/* DETAIL OVERLAY */
#detailOverlay{position:fixed;inset:0;z-index:200;background:var(--glass3);
display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
#detailOverlay.open{display:block}
.det{max-width:880px;margin:0 auto;padding:60px 48px 120px}
.det-close{position:fixed;top:24px;right:32px;font-size:32px;font-weight:300;
color:var(--g2);cursor:pointer;z-index:201;background:none;border:none;font-family:inherit;
transition:color .15s}
.det-close:hover{color:var(--fg)}
.det h2{font-size:38px;font-weight:900;letter-spacing:-2px;line-height:1.05}
.det .d-uni{font-size:15px;font-weight:300;color:var(--g1);margin-top:4px}
.det .d-loc{font-size:11px;font-weight:400;color:var(--g2);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.d-badge{display:inline-block;margin-top:14px;padding:6px 18px;font-size:10px;font-weight:900;
letter-spacing:3px;text-transform:uppercase;border:1px solid}
.d-badge.v{color:var(--fg);border-color:var(--fg)}
.d-badge.g{color:var(--g1);border-color:var(--g1)}
.d-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:36px}
.d-m{background:var(--card);padding:20px}
.d-m .dv{font-size:24px;font-weight:900;letter-spacing:-1px}
.d-m .dl{font-size:8px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;color:var(--g1);margin-top:3px}
.d-sec{margin-top:44px}
.d-sec h3{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
color:var(--g1);padding-bottom:10px;border-bottom:1px solid var(--border2)}
.d-sec .d-body{margin-top:16px}
.tl{display:flex;align-items:center;gap:0;margin-top:16px}
.tl-b{padding:14px 18px;text-align:center}
.tl-b .tl-v{font-size:18px;font-weight:900;letter-spacing:-.5px}
.tl-b .tl-l{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:2px}
.tl-s{background:var(--tl-s);color:var(--fg)}
.tl-e{background:var(--tl-e);color:var(--fg2)}
.tl-g{background:var(--tl-g);color:var(--g1)}
.tl-arr{font-size:16px;color:var(--g2);padding:0 3px}
.sc{background:var(--card);padding:24px 28px;margin-bottom:3px}
.sc h4{font-size:14px;font-weight:700;letter-spacing:-.1px}
.sc .sc-prov{font-size:11px;font-weight:300;color:var(--g1);margin-top:1px}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
.sc-s .sv{font-size:18px;font-weight:900;letter-spacing:-.5px}
.sc-s .sl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--g1);margin-top:1px}
.sc-tags{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.sc-tg{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
padding:2px 7px;background:var(--hover);color:var(--g1)}
.rec-box{background:var(--card);border-left:3px solid var(--fg);padding:20px 24px;margin-top:16px}
.rec-box p{font-size:12px;font-weight:300;line-height:1.7;color:var(--fg2);letter-spacing:.2px}
.d-link{display:inline-block;margin-top:20px;padding:10px 28px;border:1px solid var(--fg);
color:var(--fg);text-decoration:none;font-size:9px;font-weight:700;letter-spacing:3px;
text-transform:uppercase;transition:all .15s}
.d-link:hover{background:var(--fg);color:var(--bg)}

/* LOADING */
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--fg);
border-radius:50%;animation:spin .6s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-indicator{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:110;
background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px 28px;
font-size:11px;font-weight:300;letter-spacing:1.5px;color:var(--g1);display:none;text-align:center;
max-width:440px;line-height:1.6;backdrop-filter:blur(12px)}
.ai-indicator.show{display:block}
#aiPhrase{transition:opacity .4s;display:block;margin-top:4px}
.ai-indicator .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;
background:var(--fg);margin-right:8px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* COOKIE BANNER — centered, bold contrast */
#cookieBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;
background:rgba(255,255,255,.95);backdrop-filter:blur(24px);
border-radius:16px;padding:36px 40px;text-align:center;
max-width:380px;width:85%;
opacity:1;transition:opacity .8s ease,filter .8s ease,transform .8s ease}
#cookieBanner.hidden{opacity:0;filter:blur(16px);transform:translate(-50%,-50%) scale(.92);pointer-events:none}
body[data-theme="light"] #cookieBanner{background:rgba(10,10,10,.95)}
body[data-theme="light"] #cookieBanner p{color:#ccc}
body[data-theme="light"] .cookie-btn.accept{background:#fff;color:#000;border-color:#fff}
body[data-theme="light"] .cookie-btn.decline{color:#888;border-color:#333}
#cookieBanner p{font-size:13px;font-weight:400;color:#222;letter-spacing:.2px;line-height:1.6;margin-bottom:20px}
.cookie-btns{display:flex;gap:10px;justify-content:center}
.cookie-btn{padding:10px 28px;font-family:inherit;font-size:10px;font-weight:900;
letter-spacing:2.5px;text-transform:uppercase;border-radius:24px;cursor:pointer;transition:all .2s}
.cookie-btn.accept{background:#111;color:#fff;border:1px solid #111}
.cookie-btn.accept:hover{background:#333}
.cookie-btn.decline{background:transparent;color:#999;border:1px solid #ddd}
.cookie-btn.decline:hover{border-color:#999;color:#666}

/* RESPONSIVE */
@media(max-width:768px){
  #resultsPanel{width:100%;border-left:none;border-top:1px solid #1a1a1a}
  .d-grid{grid-template-columns:repeat(2,1fr)}
  .sc-grid{grid-template-columns:1fr 1fr}
  .det{padding:40px 20px 80px}
  .det h2{font-size:28px}
  #searchBubble{bottom:16px;max-width:95%}
}
</style>

<body data-theme="dark">
<canvas id="globe"></canvas>

<!-- LOGO -->
<div id="logo">
  <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:26px;height:26px;opacity:.6">
    <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="0.8"/>
    <ellipse cx="16" cy="16" rx="6" ry="14" stroke="currentColor" stroke-width="0.6" opacity=".5"/>
    <ellipse cx="16" cy="16" rx="11" ry="14" stroke="currentColor" stroke-width="0.5" opacity=".3"/>
    <line x1="2" y1="16" x2="30" y2="16" stroke="currentColor" stroke-width="0.5" opacity=".4"/>
    <line x1="2" y1="10" x2="30" y2="10" stroke="currentColor" stroke-width="0.4" opacity=".25"/>
    <line x1="2" y1="22" x2="30" y2="22" stroke="currentColor" stroke-width="0.4" opacity=".25"/>
  </svg>
  <span class="logo-text">LOGO</span>
</div>

<!-- TOP-RIGHT CONTROLS -->
<div class="top-controls">
  <button id="langToggle" class="ctrl-btn" title="Switch language">EN</button>
  <button id="themeToggle" class="ctrl-btn" title="Toggle theme">
    <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
</div>

<!-- AI INDICATOR -->
<div class="ai-indicator" id="aiIndicator">
  <span class="pulse"></span>
  <span id="aiPhrase">RESEARCHING WITH AI...</span>
</div>

<!-- SEARCH BUBBLE -->
<div id="searchBubble">
  <div class="lupa" id="lupaBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
  <input type="text" id="searchQ" placeholder="SEARCH PROGRAMS...">
  <button id="searchBtn">SEARCH</button>
  <div class="filters-row">
    <div class="filter-grp">
      <span class="f-label">Degree</span>
      <span class="chip" data-d="bachelors">BSc</span>
      <span class="chip on" data-d="masters">MSc</span>
      <span class="chip" data-d="doctorate">PhD</span>
    </div>
    <div class="filter-grp">
      <span class="f-label">Region</span>
      <div class="region-chips" id="regionChips"></div>
    </div>
    <div class="filter-grp" id="countryGrp" style="display:none">
      <span class="f-label">Countries</span>
      <div class="country-tags" id="countryTags"></div>
    </div>
  </div>
</div>

<!-- RESULTS PANEL -->
<div id="resultsPanel">
  <div class="r-head">
    <div class="r-count"><span id="rCount">0</span> pathways</div>
    <button class="r-close" id="rClose">&times;</button>
  </div>
  <div class="r-list" id="rList"></div>
</div>

<!-- DETAIL OVERLAY -->
<div id="detailOverlay">
  <div class="det" id="detContent"></div>
</div>

<!-- COOKIE BANNER -->
<div id="cookieBanner" class="hidden">
  <p id="cookieText"></p>
  <div class="cookie-btns">
    <button class="cookie-btn accept" id="cookieAccept"></button>
    <button class="cookie-btn decline" id="cookieDecline"></button>
  </div>
</div>

  }
}
</script>

const GLOBE_R = 5;
function ll2v(lat, lng, r = GLOBE_R) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')
  .then(r => r.json())
  .then(world => {
    // Parse TopoJSON manually (no library needed for simple arcs)
    const arcs = world.arcs;
    const transform = world.transform;
    function decodeArc(arcIdx) {
      const reversed = arcIdx < 0;
      const idx = reversed ? ~arcIdx : arcIdx;
      const arc = arcs[idx];
      const coords = [];
      let x = 0, y = 0;
      arc.forEach(([dx, dy]) => {
        x += dx; y += dy;
        const lng = x * transform.scale[0] + transform.translate[0];
        const lat = y * transform.scale[1] + transform.translate[1];
        coords.push([lat, lng]);
      });
      if (reversed) coords.reverse();
      return coords;
    }
    // Get land geometry arcs
    const landObj = world.objects.land;
    const geometries = landObj.type === 'GeometryCollection' ? landObj.geometries : [landObj];
    geometries.forEach(geom => {
      const arcSets = geom.type === 'MultiPolygon' ? geom.arcs.flat() : (geom.arcs || []);
      arcSets.forEach(ring => {
        const pts = [];
        ring.forEach(arcIdx => {
          decodeArc(arcIdx).forEach(([lat, lng]) => {
            pts.push(ll2v(lat, lng, GLOBE_R + 0.04));
          });
        });
        if (pts.length > 1) {
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          coastGroup.add(new THREE.Line(geo, coastMat));
        }
      });
    });
  }).catch(e => console.warn('Coastline load failed:', e));

// ─── CAMERA ANIMATION ────────────────────────────────
let camAnim = null;
function flyTo(lat, lng, onDone) {
  const targetPos = ll2v(lat, lng, 12);
  const targetLook = ll2v(lat, lng, 0);
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  let t = 0;
  controls.autoRotate = false;
  camAnim = { targetPos, targetLook, startPos, startTarget, t, onDone };
}
function updateCamAnim() {
  if (!camAnim) return;
  camAnim.t += 0.015;
  const t = easeInOut(Math.min(camAnim.t, 1));
  camera.position.lerpVectors(camAnim.startPos, camAnim.targetPos, t);
  controls.target.lerpVectors(camAnim.startTarget, camAnim.targetLook, t);
  if (camAnim.t >= 1) {
    if (camAnim.onDone) camAnim.onDone();
    camAnim = null;
  }
}
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

// ─── NODE PULSE ANIMATION ────────────────────────────
let clock = 0;
function updatePulse() {
  clock += 0.03;
  // Home ring pulses
  const homeScale = 1 + Math.sin(clock * 2) * 0.15;
  homeRing.scale.setScalar(homeScale);
  homeRing.material.opacity = 0.3 + Math.sin(clock * 2) * 0.1;
  // Reference city dots pulse gently (staggered)
  refRings.forEach((r, i) => {
    const phase = clock * 1.5 + i * 0.5;
    const s = 1 + Math.sin(phase) * 0.2;
    r.scale.setScalar(s);
    r.material.opacity = 0.25 + Math.sin(phase) * 0.1;
  });
  refDots.forEach((d, i) => {
    d.material.opacity = 0.65 + Math.sin(clock * 1.5 + i * 0.5) * 0.2;
  });
  // Result rings pulse
  resultRings.forEach((r, i) => {
    const active = i === activeIdx;
    const scale = active ? 1.2 + Math.sin(clock * 2 + i) * 0.2 : 1 + Math.sin(clock * 2 + i) * 0.1;
    r.scale.setScalar(scale);
    r.material.opacity = active ? 0.5 : 0.2;
  });
  // Highlight active arc
  resultArcs.forEach((group, i) => {
    group.forEach(a => { if(a.material) a.material.opacity = i === activeIdx ? 0.3 : 0.08; });
  });
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateCamAnim();
  updatePulse();
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── STATE ───────────────────────────────────────────
let results = [];
let degrees = ['masters'];
let bubbleLocked = false; // Prevents focus from re-expanding after collapse

// ─── SEARCH UI ───────────────────────────────────────
const bubble = document.getElementById('searchBubble');
const qInput = document.getElementById('searchQ');
const sBtn = document.getElementById('searchBtn');
const aiInd = document.getElementById('aiIndicator');

document.getElementById('lupaBtn').onclick = () => {
  if (bubble.classList.contains('collapsed')) {
    // Open from collapsed state
    bubble.classList.remove('collapsed');
    bubble.classList.add('expanded');
    bubbleLocked = false;
    setTimeout(() => qInput.focus(), 100);
  } else if (bubble.classList.contains('expanded')) {
    // Close back to collapsed if results are showing
    if (rPanel.classList.contains('open')) {
      bubbleLocked = true;
      qInput.blur();
      bubble.classList.remove('expanded');
      bubble.classList.add('collapsed');
      setTimeout(() => { bubbleLocked = false; }, 400);
    } else {
      bubble.classList.remove('expanded');
    }
  } else {
    bubble.classList.add('expanded');
  }
};
qInput.addEventListener('focus', () => {
  if (bubbleLocked) return;
  if (bubble.classList.contains('collapsed')) {
    bubble.classList.remove('collapsed');
  }
  bubble.classList.add('expanded');
});

document.querySelectorAll('.chip[data-d]').forEach(c => {
  c.onclick = () => { c.classList.toggle('on'); degrees = [...document.querySelectorAll('.chip.on[data-d]')].map(x=>x.dataset.d); };
});

function doSearch() {
  const q = qInput.value.trim();
  if (!q) return;
  sBtn.disabled = true;
  sBtn.textContent = '...';
  aiInd.classList.add('show');
  startPhraseRotation();

  // If regions selected but no specific countries, use all countries from selected regions
  let countries = [...selectedCountries];
  if (!countries.length && selectedRegions.size) {
    selectedRegions.forEach(r => { REGIONS[r].forEach(c => { if (!countries.includes(c)) countries.push(c); }); });
  }
  let url = `/api/search?q=${encodeURIComponent(q)}&fresh=true&lang=${lang}&`;
  degrees.forEach(d => url += `degree=${d}&`);
  countries.forEach(c => url += `country=${c}&`);

  fetch(url).then(r=>r.json()).then(data => {
    // Sort by VCI ascending (lower cost = better). Nulls go last.
    data.sort((a, b) => {
      if (a.vci_usd == null && b.vci_usd == null) return 0;
      if (a.vci_usd == null) return 1;
      if (b.vci_usd == null) return -1;
      return a.vci_usd - b.vci_usd;
    });
    // Assign fresh ranks
    data.forEach((r, i) => { r._rank = i + 1; });
    results = data;
    sBtn.disabled = false;
    sBtn.textContent = t('searchBtn');
    aiInd.classList.remove('show');
    stopPhraseRotation();
    showResults(data);
    // Collapse search bubble to give results full view
    if (data.length) {
      bubbleLocked = true;
      qInput.blur();
      setTimeout(() => {
        bubble.classList.remove('expanded');
        bubble.classList.add('collapsed');
        setTimeout(() => { bubbleLocked = false; }, 400);
      }, 500);
    }
  }).catch(() => {
    sBtn.disabled = false;
    sBtn.textContent = t('searchBtn');
    aiInd.classList.remove('show');
    stopPhraseRotation();
  });
}
sBtn.onclick = doSearch;
qInput.onkeydown = e => { if (e.key === 'Enter') doSearch(); };

// ─── RESULTS PANEL ───────────────────────────────────
const rPanel = document.getElementById('resultsPanel');
const rList = document.getElementById('rList');
document.getElementById('rClose').onclick = () => {
  rPanel.classList.remove('open');
  clearResults3D();
  controls.autoRotate = true;
  activeIdx = -1;
  // Restore search bubble
  bubble.classList.remove('collapsed');
  bubble.classList.remove('expanded');
};

function showResults(data) {
  clearResults3D();
  document.getElementById('rCount').textContent = data.length;

  if (!data.length) {
    rList.innerHTML = `<div style="padding:40px 28px;text-align:center"><p style="font-size:13px;color:#444;letter-spacing:2px">${t('noPathways')}</p></div>`;
    rPanel.classList.add('open');
    return;
  }

  rList.innerHTML = data.map((r, i) => {
    const scholName = r.best_scholarship_name || r.university_scholarship || '—';
    const covPct = r.best_coverage_pct != null ? r.best_coverage_pct + '%' : (r.coverage_pct != null ? r.coverage_pct + '%' : '—');
    const stipend = r.best_stipend_monthly ? '$' + Number(r.best_stipend_monthly).toLocaleString() + '/mo' : (r.best_stipend_annual ? '$' + Math.round(r.best_stipend_annual/12).toLocaleString() + '/mo' : '—');
    return `<div class="rcard${i===0?' active':''}" data-i="${i}" data-pid="${r.program_id}">
      <div class="rk">${r._rank||i+1}</div>
      <div class="rinfo">
        <h4>${r.program_name||''}</h4>
        <div class="runi">${r.university||''} — ${r.city||''}, ${r.country_name||r.country_id||''}</div>
        <div class="rtags"><span class="rtag v">${scholName}</span><span class="rtag i">${t('coverage')}: ${covPct}</span></div>
      </div>
      <div class="rvci">
        <div class="rv">${stipend}</div>
        <div class="rl">${t('stipend')}</div>
      </div>
    </div>`;
  }).join('');

  rPanel.classList.add('open');

  // Add 3D nodes
  data.forEach(r => {
    const coords = r.coords || getCityCoords(r.city);
    if (coords) addResultNode(coords[0], coords[1], r.viability_status === 'VIABLE');
  });

  // Fly to first result
  const first = data[0];
  const c0 = first.coords || getCityCoords(first.city);
  if (c0) flyTo(c0[0], c0[1]);
  setActive(0);

  // Card click handlers
  rList.querySelectorAll('.rcard').forEach(card => {
    card.onclick = () => {
      const i = parseInt(card.dataset.i);
      if (i === activeIdx) {
        openDetail(card.dataset.pid);
      } else {
        setActive(i);
        const r = data[i];
        const coords = r.coords || getCityCoords(r.city);
        if (coords) flyTo(coords[0], coords[1]);
      }
    };
  });
}

function getCityCoords(city) {
  return CITY_COORDS[city] || null;
}

function setActive(i) {
  activeIdx = i;
  rList.querySelectorAll('.rcard').forEach((c, j) => c.classList.toggle('active', j === i));
}

// ─── DETAIL VIEW ─────────────────────────────────────
const detOverlay = document.getElementById('detailOverlay');
const detContent = document.getElementById('detContent');

function openDetail(pid) {
  detContent.innerHTML = '<div class="spinner"></div>';
  detOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch(`/api/program/${pid}`).then(r=>r.json()).then(d => {
    const sm = d.study_visa_months || 0;
    const em = d.post_study_extension_months || 0;
    const prM = d.months_to_pr || 0;
    const totalVisa = sm + em;
    const remaining = Math.max(0, prM - totalVisa);
    const annual = d.tuition_annual_usd ? '$'+Number(d.tuition_annual_usd).toLocaleString() : '—';
    const full = d.full_tuition_usd ? '$'+Number(d.full_tuition_usd).toLocaleString() : '—';
    const maxHrs = d.max_hours_per_week || '—';

    // ─── TIMELINE ───
    const tlHtml = `<div class="tl">
      <div class="tl-b tl-s" style="flex:${sm||1}"><div class="tl-v">${sm}</div><div class="tl-l">${t('study')}</div></div>
      <div class="tl-arr">+</div>
      <div class="tl-b tl-e" style="flex:${em||1}"><div class="tl-v">${em}</div><div class="tl-l">${t('postStudy')}</div></div>
      <div class="tl-arr">+</div>
      <div class="tl-b tl-s" style="flex:${remaining||1};opacity:.6"><div class="tl-v">?</div><div class="tl-l">${t('workVisa')}</div></div>
      <div class="tl-arr">&minus;</div>
      <div class="tl-b tl-e" style="flex:${prM||1}"><div class="tl-v">${prM}</div><div class="tl-l">${t('timeToPR')}</div></div>
      <div class="tl-arr">=</div>
      <div class="tl-b ${remaining>0?'tl-g':'tl-s'}" style="flex:${remaining||1}"><div class="tl-v">${remaining}</div><div class="tl-l">${t('remaining')}</div></div>
    </div>`;

    // ─── SCHOLARSHIPS GRID ───
    let scholHtml = '';
    if (d.scholarships && d.scholarships.length) {
      scholHtml = d.scholarships.map(s => {
        const covPct = s.coverage_pct != null ? s.coverage_pct + '%' : '—';
        const tuitionNum = d.full_tuition_usd || 0;
        const scholAmount = s.coverage_pct != null && tuitionNum ? '$' + Math.round(tuitionNum * s.coverage_pct / 100).toLocaleString() : (s.annual_stipend_usd ? '$' + Number(s.annual_stipend_usd).toLocaleString() : '—');
        const costAfter = s.coverage_pct != null && tuitionNum ? '$' + Math.round(tuitionNum * (1 - s.coverage_pct / 100)).toLocaleString() : '—';
        const workSpec = s.work_specification || (d.max_hours_per_week ? maxHrs + 'h/wk' : '—');
        const tags = [];
        if (s.covers_mobility_expenses) tags.push(`<span class="sc-tg">${t('mobility')}</span>`);
        if (s.covers_medical_insurance) tags.push(`<span class="sc-tg">${t('medical')}</span>`);
        if (s.monthly_stipend_usd) tags.push(`<span class="sc-tg">${t('stipend')}: $${Number(s.monthly_stipend_usd).toLocaleString()}/mo</span>`);
        return `<div class="sc">
          <h4>${s.scholarship_name}</h4>
          <div class="sc-prov">${s.provider_organization}</div>
          <div class="sc-grid">
            <div class="sc-s"><div class="sv">${covPct}</div><div class="sl">${t('coverage')}</div></div>
            <div class="sc-s"><div class="sv">${scholAmount}</div><div class="sl">${t('scholAmount')}</div></div>
            <div class="sc-s"><div class="sv">${costAfter}</div><div class="sl">${t('costAfterSchol')}</div></div>
          </div>
          <div class="sc-grid" style="margin-top:8px">
            <div class="sc-s"><div class="sv">${d.duration_months||'—'} mo</div><div class="sl">${t('duration')}</div></div>
            <div class="sc-s"><div class="sv">${workSpec}</div><div class="sl">${t('workAllowed')}</div></div>
            <div class="sc-s"><div class="sv">${s.application_deadline||'—'}</div><div class="sl">${t('deadline')}</div></div>
          </div>
          <div class="sc-tags">${tags.join('')}</div>
        </div>`;
      }).join('');
    } else {
      scholHtml = `<p style="color:var(--g1);font-size:12px;font-weight:300">${t('noScholarships')}</p>`;
    }

    detContent.innerHTML = `
      <button class="det-close" id="detClose">&times;</button>
      <h2>${d.program_name}</h2>
      <div class="d-uni">${d.university}</div>
      <div class="d-loc">${d.city}, ${d.country_name} (${d.country_id})</div>
      <div class="d-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="d-m"><div class="dv">${annual}</div><div class="dl">${t('tuitionYear')}</div></div>
        <div class="d-m"><div class="dv">${full}</div><div class="dl">${t('fullTuition')}</div></div>
        <div class="d-m"><div class="dv">${d.duration_months||'—'} mo</div><div class="dl">${t('duration')}</div></div>
        <div class="d-m"><div class="dv">${maxHrs}h/wk</div><div class="dl">${t('workAllowed')}</div></div>
        <div class="d-m"><div class="dv">${d.language_of_instruction||'English'}</div><div class="dl">${t('language')}</div></div>
        <div class="d-m"><div class="dv">${d.embassy_in_peru?t('yes'):t('no')}</div><div class="dl">${t('embassyIn')} ${userCountryName}</div></div>
      </div>
      <div class="d-sec"><h3>${t('timeline')}</h3><div class="d-body">${tlHtml}</div></div>
      <div class="d-sec"><h3>${t('scholarships')} (${d.scholarships?d.scholarships.length:0})</h3><div class="d-body">${scholHtml}</div></div>
      <div class="d-sec"><h3>${t('recommendation')}</h3><div class="d-body">
        <div class="rec-box"><p>${d.recommended_action||t('noRecommendation')}</p></div>
      </div></div>
      ${d.program_url?`<a class="d-link" href="${d.program_url}" target="_blank" rel="noopener">${t('visitProgram')} &rarr;</a>`:''}
    `;
    document.getElementById('detClose').onclick = closeDetail;
  });
}

function closeDetail() {
  detOverlay.classList.remove('open');
  document.body.style.overflow = '';
}
detOverlay.onclick = e => { if (e.target === detOverlay) closeDetail(); };
document.onkeydown = e => { if (e.key === 'Escape') closeDetail(); };
</script>
</body>
</html>
